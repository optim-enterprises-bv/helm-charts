apiVersion: v2
name: optimacs
description: |
  Full OptimACS stack — USP Controller (TR-369/ac-server), management web UI
  (FastAPI + GraphQL), EMQX MQTT broker, MySQL replication cluster,
  Smallstep step-ca PKI for certificate lifecycle management, an optional
  streaming telemetry pipeline (Redpanda → Vector → VictoriaMetrics), and
  Databunker AES-256-encrypted PII vault.
type: application
version: 0.7.0
appVersion: "0.7.0"
keywords:
  - usp
  - tr-369
  - acp
  - access-point
  - iot
  - tls
  - post-quantum
  - mqtt
  - pki
  - certificate-authority
maintainers:
  - name: optim-enterprises-bv

dependencies:
  # Bitnami MySQL — deployed as a primary/replica cluster.
  # Run `helm dependency update charts/optimacs` to fetch chart archives.
  - name: mariadb
    version: "25.0.1"
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
    alias: mysql

  # Bitnami Redis — optional config-proto cache and rate-limit store.
  # Set redis.enabled=true to deploy; or point redis.url at an external instance.
  - name: redis
    version: ">=20.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  # EMQX — MQTT broker for the USP MQTT MTP (TR-369).
  # Set emqx.enabled=false and configure usp.mqtt.url to use an external broker.
  - name: emqx
    version: ">=5.0.0"
    repository: https://repos.emqx.io/charts
    condition: emqx.enabled

  # Smallstep step-ca — PKI / certificate authority for device cert lifecycle.
  # Set stepca.enabled=true to deploy an in-cluster CA.
  # Or point stepca.url at an external step-ca instance (stepca.enabled=false).
  # Full chart reference: https://github.com/smallstep/helm-charts
  - name: step-certificates
    version: ">=1.0.0"
    repository: https://smallstep.github.io/helm-charts
    condition: stepca.enabled

  # ── Telemetry pipeline (all optional — disabled by default) ───────────────

  # Redpanda — Kafka-compatible event broker for USP telemetry streaming.
  # ac-server publishes Boot!/ValueChange events; Vector consumes and forwards.
  # Set redpanda.enabled=true and supply a storage class for production.
  # Full chart reference: https://github.com/redpanda-data/helm-charts
  - name: redpanda
    version: ">=5.0.0"
    repository: https://charts.redpanda.com
    condition: redpanda.enabled

  # VictoriaMetrics / Grafana are expected to already exist in the cluster.
  # Vector forwards metrics via Prometheus remote-write to the existing VM stack.
  # No sub-charts for InfluxDB or Grafana — set victoriametrics.remoteWriteUrl
  # in values.yaml to point at your cluster's VictoriaMetrics remote-write endpoint.

  # DatabunkerPro — privacy vault and tokenization service for personal data.
  # Official Helm chart: https://securitybunker.github.io/databunkerpro-setup
  - name: databunkerpro
    version: "0.1.0"
    repository: https://securitybunker.github.io/databunkerpro-setup
    condition: databunker.enabled

  # InfluxDB v2 — time-series database for device telemetry.
  # Set influxdb.enabled=true to deploy an in-cluster InfluxDB instance.
  - name: influxdb2
    version: ">=2.0.0"
    repository: https://helm.influxdata.com
    condition: influxdb.enabled

  # Grafana — dashboards and alerting on telemetry data.
  # Set grafana.enabled=true to deploy an in-cluster Grafana instance.
  - name: grafana
    version: ">=6.0.0"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
